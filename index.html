<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校園美食評分 - 純 HTML 版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        orange: {
                            500: '#f97316',
                            600: '#ea580c',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-neutral-50 dark:bg-neutral-950 text-neutral-900 dark:text-neutral-100 transition-colors duration-300">
    
    <!-- 導航欄 -->
    <header class="sticky top-0 z-40 bg-white/80 dark:bg-neutral-900/80 backdrop-blur-md border-b border-neutral-200 dark:border-neutral-800">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold tracking-tight flex items-center gap-2">
                <i data-lucide="utensils" class="text-orange-500"></i>
                <span>校園美食評分</span>
            </h1>
            
            <div class="flex items-center gap-2">
                <button id="themeToggle" class="p-2 rounded-full hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-colors">
                    <i data-lucide="moon" id="moonIcon" class="w-5 h-5"></i>
                    <i data-lucide="sun" id="sunIcon" class="w-5 h-5 hidden"></i>
                </button>
                <button id="addBtn" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-full font-medium flex items-center gap-2 transition-all active:scale-95 shadow-lg shadow-orange-500/20">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                    <span class="hidden sm:inline">推薦美食</span>
                </button>
            </div>
        </div>

        <!-- 篩選欄 -->
        <div class="max-w-4xl mx-auto px-4 py-3 flex flex-col gap-3">
            <!-- 類別篩選 -->
            <div id="categoryFilters" class="overflow-x-auto no-scrollbar flex items-center gap-2">
                <!-- 由 JS 渲染 -->
            </div>

            <!-- 狀態篩選 & 統計 -->
            <div class="flex flex-wrap items-center justify-between gap-3 border-t border-neutral-100 dark:border-neutral-800 pt-3">
                <div id="statusFilters" class="flex items-center gap-2">
                    <!-- 由 JS 渲染 -->
                </div>

                <div class="flex items-center gap-4 text-[10px] font-bold uppercase tracking-widest text-neutral-400 dark:text-neutral-500">
                    <div class="flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-orange-500"></span>
                        <span>Active: <span id="activeCount" class="text-neutral-900 dark:text-white">0</span></span>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                        <span>Done: <span id="doneCount" class="text-neutral-900 dark:text-white">0</span></span>
                    </div>
                    <div class="pl-2 border-l border-neutral-200 dark:border-neutral-800">
                        <span>Total: <span id="totalCount" class="text-neutral-900 dark:text-white">0</span></span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主內容區 -->
    <main class="max-w-4xl mx-auto px-4 py-8">
        <div id="foodList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- 由 JS 渲染 -->
        </div>

        <div id="emptyState" class="hidden text-center py-20">
            <div class="w-20 h-20 bg-neutral-100 dark:bg-neutral-800 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="utensils" class="w-10 h-10 text-neutral-300 dark:text-neutral-600"></i>
            </div>
            <p class="text-neutral-500">暫無相關美食，快來推薦一個吧！</p>
        </div>
    </main>

    <!-- 新增美食彈窗 -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
        <div id="modalOverlay" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div class="relative w-full max-w-md bg-white dark:bg-neutral-900 rounded-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
            <div class="p-6 border-b border-neutral-100 dark:border-neutral-800 flex items-center justify-between">
                <h2 class="text-xl font-bold">推薦校園美食</h2>
                <button id="closeModal" class="p-2 rounded-full hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <form id="foodForm" class="p-6 space-y-6">
                <div>
                    <label class="block text-sm font-bold mb-2 text-neutral-500 uppercase tracking-wider">美食名稱</label>
                    <input type="text" id="foodName" required placeholder="例如：小食部魚蛋" class="w-full px-4 py-3 rounded-xl bg-neutral-100 dark:bg-neutral-800 border-transparent focus:ring-2 focus:ring-orange-500/50 outline-none transition-all">
                </div>

                <div>
                    <label class="block text-sm font-bold mb-2 text-neutral-500 uppercase tracking-wider">分類</label>
                    <div id="modalCategoryGrid" class="grid grid-cols-2 gap-2">
                        <!-- 由 JS 渲染 -->
                    </div>
                </div>

                <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all active:scale-95 shadow-lg shadow-orange-500/20">
                    <i data-lucide="send" class="w-5 h-5"></i>
                    立即提交
                </button>
            </form>
        </div>
    </div>

    <script>
        // 常數與配置
        const CATEGORIES = ["全部", "小食", "熱食", "飲品", "主食"];
        const LS_KEY = "records";

        // 全域狀態
        let currentFilter = "全部";
        let currentStatusFilter = "all";
        let selectedNewCategory = "小食";

        // --- 核心 Function (規則 6) ---

        /**
         * 讀取資料 (規則 6.2)
         */
        function loadData() {
            const raw = localStorage.getItem(LS_KEY);
            return raw ? JSON.parse(raw) : [];
        }

        /**
         * 儲存資料 (規則 6.1)
         */
        function saveData(newRecord) {
            const records = loadData();
            records.unshift(newRecord); // 新的在前面
            localStorage.setItem(LS_KEY, JSON.stringify(records));
        }

        /**
         * 渲染列表 (規則 6.3)
         */
        function renderList() {
            const records = loadData();
            const listEl = document.getElementById('foodList');
            const emptyEl = document.getElementById('emptyState');
            
            // 過濾邏輯
            let filtered = records;
            if (currentFilter !== "全部") {
                filtered = filtered.filter(r => r.category === currentFilter);
            }
            if (currentStatusFilter !== "all") {
                filtered = filtered.filter(r => r.status === currentStatusFilter);
            }

            // 排序: active 在前，然後按時間降序
            filtered.sort((a, b) => {
                if (a.status === b.status) {
                    return new Date(b.createdAt) - new Date(a.createdAt);
                }
                return a.status === 'active' ? -1 : 1;
            });

            // 統計數字
            const active = records.filter(r => r.status === 'active').length;
            const done = records.filter(r => r.status === 'done').length;
            document.getElementById('activeCount').textContent = active;
            document.getElementById('doneCount').textContent = done;
            document.getElementById('totalCount').textContent = records.length;

            // 清空並重新渲染
            listEl.innerHTML = '';
            if (filtered.length === 0) {
                emptyEl.classList.remove('hidden');
            } else {
                emptyEl.classList.add('hidden');
                filtered.forEach(record => {
                    const card = createCard(record);
                    listEl.appendChild(card);
                });
            }

            // 重新初始化圖標
            lucide.createIcons();
        }

        // --- 輔助邏輯 ---

        function createCard(record) {
            const div = document.createElement('div');
            const isDone = record.status === 'done';
            div.className = `relative rounded-2xl p-5 border transition-all ${isDone ? 'bg-neutral-100 dark:bg-neutral-800/50 border-neutral-200 dark:border-neutral-800 opacity-60' : 'bg-white dark:bg-neutral-900 border-neutral-200 dark:border-neutral-800 shadow-sm hover:shadow-md'}`;
            
            const categoryIcon = getCategoryIcon(record.category);
            const dateStr = new Date(record.createdAt).toLocaleDateString();

            div.innerHTML = `
                ${isDone ? `<div class="absolute -top-2 -right-2 z-10 bg-green-500 text-white text-[10px] font-bold px-2 py-1 rounded-lg shadow-lg flex items-center gap-1"><i data-lucide="check" class="w-3 h-3"></i>已吃過</div>` : ''}
                <div class="flex justify-between items-start mb-4">
                    <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs font-bold uppercase tracking-wider ${isDone ? 'bg-neutral-200 dark:bg-neutral-700 text-neutral-500' : 'bg-orange-100 dark:bg-orange-900/30 text-orange-600 dark:text-orange-400'}">
                        ${categoryIcon} ${record.category}
                    </span>
                    <span class="text-[10px] text-neutral-400 font-mono">${dateStr}</span>
                </div>
                <h3 class="text-lg font-semibold mb-6 line-clamp-2 leading-tight ${isDone ? 'text-neutral-500' : ''}">${record.name}</h3>
                <div class="flex flex-col gap-3">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-1.5">
                            <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm ${isDone ? 'bg-neutral-200 dark:bg-neutral-700 text-neutral-400' : 'bg-neutral-100 dark:bg-neutral-800 text-orange-500'}">${record.votes || 0}</div>
                            <span class="text-xs text-neutral-500 font-medium">認同</span>
                        </div>
                        <button onclick="vote('${record.id}')" ${isDone ? 'disabled' : ''} class="flex items-center gap-2 px-4 py-2 rounded-xl transition-all active:scale-90 ${isDone ? 'bg-transparent text-neutral-400 cursor-not-allowed' : 'bg-neutral-100 dark:bg-neutral-800 hover:bg-orange-50 dark:hover:bg-orange-900/20 text-neutral-600 dark:text-neutral-400 hover:text-orange-600 dark:hover:text-orange-400'}">
                            <i data-lucide="thumbs-up" class="w-4 h-4"></i><span class="text-sm font-bold">+1</span>
                        </button>
                    </div>
                    ${!isDone ? `
                        <button onclick="toggleStatus('${record.id}')" class="w-full py-2 rounded-xl text-xs font-bold flex items-center justify-center gap-2 transition-all active:scale-95 bg-green-100 dark:bg-green-900/20 text-green-600 dark:text-green-400 hover:bg-green-200 dark:hover:bg-green-900/40">
                            <i data-lucide="check" class="w-3 h-3"></i>已吃過
                        </button>
                    ` : `
                        <div class="w-full py-2 rounded-xl text-xs font-bold flex items-center justify-center gap-2 bg-neutral-200 dark:bg-neutral-700 text-neutral-500 cursor-default">
                            <i data-lucide="check" class="w-3 h-3"></i>已品嚐
                        </div>
                    `}
                </div>
            `;
            return div;
        }

        function getCategoryIcon(cat) {
            const icons = {
                "小食": '<i data-lucide="cookie" class="w-4 h-4"></i>',
                "熱食": '<i data-lucide="flame" class="w-4 h-4"></i>',
                "飲品": '<i data-lucide="coffee" class="w-4 h-4"></i>',
                "主食": '<i data-lucide="utensils" class="w-4 h-4"></i>'
            };
            return icons[cat] || '<i data-lucide="filter" class="w-4 h-4"></i>';
        }

        // --- 互動邏輯 ---

        window.vote = (id) => {
            const records = loadData();
            const record = records.find(r => r.id === id);
            if (record) {
                record.votes = (record.votes || 0) + 1;
                localStorage.setItem(LS_KEY, JSON.stringify(records));
                renderList();
            }
        };

        window.toggleStatus = (id) => {
            const records = loadData();
            const record = records.find(r => r.id === id);
            if (record && record.status === 'active') {
                record.status = 'done';
                localStorage.setItem(LS_KEY, JSON.stringify(records));
                renderList();
            }
        };

        // --- 初始化 UI 元件 ---

        function initFilters() {
            const catContainer = document.getElementById('categoryFilters');
            catContainer.innerHTML = '';
            CATEGORIES.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all ${currentFilter === cat ? 'bg-orange-500 text-white shadow-md shadow-orange-500/20' : 'bg-white dark:bg-neutral-800 text-neutral-600 dark:text-neutral-400 border border-neutral-200 dark:border-neutral-700 hover:border-orange-500'}`;
                btn.textContent = cat;
                btn.onclick = () => { currentFilter = cat; initFilters(); renderList(); };
                catContainer.appendChild(btn);
            });

            const statusContainer = document.getElementById('statusFilters');
            statusContainer.innerHTML = '';
            [{id:'all', label:'全部'}, {id:'active', label:'只看 active'}, {id:'done', label:'只看 done'}].forEach(s => {
                const btn = document.createElement('button');
                btn.className = `px-3 py-1 rounded-lg text-xs font-bold transition-all border ${currentStatusFilter === s.id ? 'bg-neutral-900 dark:bg-white text-white dark:text-neutral-900 border-neutral-900 dark:border-white' : 'bg-transparent text-neutral-500 border-neutral-200 dark:border-neutral-700 hover:border-neutral-400'}`;
                btn.textContent = s.label;
                btn.onclick = () => { currentStatusFilter = s.id; initFilters(); renderList(); };
                statusContainer.appendChild(btn);
            });
        }

        function initModal() {
            const grid = document.getElementById('modalCategoryGrid');
            grid.innerHTML = '';
            CATEGORIES.filter(c => c !== "全部").forEach(cat => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = `px-4 py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all border-2 ${selectedNewCategory === cat ? 'bg-orange-500 border-orange-500 text-white' : 'bg-neutral-100 dark:bg-neutral-800 border-transparent text-neutral-600 dark:text-neutral-400 hover:bg-neutral-200 dark:hover:bg-neutral-700'}`;
                btn.innerHTML = `${getCategoryIcon(cat)} ${cat}`;
                btn.onclick = () => { selectedNewCategory = cat; initModal(); };
                grid.appendChild(btn);
            });
            lucide.createIcons();
        }

        // --- 事件綁定 ---

        document.getElementById('themeToggle').onclick = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('moonIcon').classList.toggle('hidden', isDark);
            document.getElementById('sunIcon').classList.toggle('hidden', !isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        const modal = document.getElementById('modal');
        document.getElementById('addBtn').onclick = () => { modal.classList.remove('hidden'); initModal(); };
        document.getElementById('closeModal').onclick = () => modal.classList.add('hidden');
        document.getElementById('modalOverlay').onclick = () => modal.classList.add('hidden');

        document.getElementById('foodForm').onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('foodName').value.trim();
            if(!name) return;

            // 構造記錄 (規則 4)
            const newRecord = {
                id: Date.now() + "_" + Math.random().toString(36).slice(2,6),
                createdAt: new Date().toISOString(),
                name: name,
                category: selectedNewCategory,
                votes: 0,
                status: "active"
            };

            saveData(newRecord);
            renderList();
            
            document.getElementById('foodName').value = '';
            modal.classList.add('hidden');
        };

        // --- 啟動 ---

        document.addEventListener('DOMContentLoaded', () => {
            // 主題恢復
            if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.getElementById('moonIcon').classList.add('hidden');
                document.getElementById('sunIcon').classList.remove('hidden');
            }

            initFilters();
            renderList();
        });
    </script>
</body>
</html>
